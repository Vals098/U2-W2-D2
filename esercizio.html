<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <!-- NAVBAR START -->
      <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
          <img src="./logo_eveline_r.png" style="width: 60px" alt="logo" />

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Saldi</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Welcome Summer</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Last Minute</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Recensioni</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Cerca posti da sogno"
              />
              <button class="btn btn-outline-danger" type="submit">
                Cerca
              </button>
            </form>
          </div>
        </div>
      </nav>
      <!-- NAVBAR END -->
      <!-- HERO START -->
      <div class="container mt-4 text-center text-lg-start">
        <div class="p-5 mb-4 bg-light rounded-3">
          <h1 class="display-5 fs-1 text-secondary">
            Eveline-R <small class="fs-6">— Feel the freedom</small>
          </h1>

          <hr />

          <p class="col-md-8 mx-auto mx-lg-0 fs-5 fst-italic text-secondary">
            Scopri le destinazioni più calde del momento!
          </p>

          <button class="btn btn-info btn-lg text-white fw-bold fs-6 py-2 px-5">Prenota ora</button>
        </div>
      </div>
      <!-- HERO END -->
    </header>
    <main></main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
